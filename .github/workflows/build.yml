name: FVCOM_Windows_Build

on: 
  push:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # 确保这里安装了 msmpi 及其开发头文件
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-msmpi

      # 跳过下载 MS-MPI SDK，直接编译依赖库 METIS
      - name: Build METIS
        shell: msys2 {0}
        run: |
          cd FVCOM/METIS_source
          sed -i 's/cc = icc/cc = gcc/g' Makefile || true
          make
          echo "METIS Build complete"

      # 编译 FVCOM 主程序
      - name: Build FVCOM
        shell: msys2 {0}
        run: |
          cd FVCOM/src
          mingw32-make clean
          mingw32-make -j2

      # 搜集文件 (注意：由于没安装 SDK，我们需要从 MSYS2 目录提取所需的 DLL)
      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/
          cp /mingw64/bin/libnetcdff-*.dll publish/
          cp /mingw64/bin/libnetcdf-*.dll publish/
          cp /mingw64/bin/libgfortran-*.dll publish/
          cp /mingw64/bin/libquadmath-*.dll publish/
          cp /mingw64/bin/libwinpthread-*.dll publish/
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/
          # 关键：从 MSYS2 中提取 msmpi.dll，这样你下载后就能直接运行
          cp /mingw64/bin/msmpi.dll publish/ || echo "msmpi.dll not found in bin, seeking in lib..."

      - name: Upload EXE Package
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM4-Windows-Binaries
          path: publish/