name: FVCOM_Windows_Build

on: 
  push:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # 关键：增加了 mingw-w64-x86_64-metis
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-metis

      # 跳过手动编译 METIS，直接编译 FVCOM
      - name: Build FVCOM
        shell: msys2 {0}
        run: |
          cd FVCOM/src
          
          # 1. 解压所有内部依赖库
          echo "Unpacking internal libraries..."
          chmod +x libs/untar.sh
          cd libs
          # 调用你的脚本解压
          ./untar.sh julian
          ./untar.sh metis
          ./untar.sh netcdf
          ./untar.sh proj
          ./untar.sh fproj
          cd ..
          
          # 2. 编译 Julian 库 (必须在主程序之前生成 libjulian.a)
          echo "Compiling Julian library..."
          cd libs/julian
          sed -i 's/cc = icc/cc = gcc/g' Makefile || true
          sed -i 's/fc = ifort/fc = gfortran/g' Makefile || true
          # 强制指定在 MSYS2 下编译
          mingw32-make
          cd ../..
          
          # 3. 修正 Windows 命令兼容性补丁
          sed -i 's/\\rm/rm -f/g' makefile
          
          # 4. 执行主编译
          echo "Starting FVCOM compilation..."
          mingw32-make clean
          # 注入搜索路径作为最终保险
          W_JUL_INC=$(cygpath -m "$(pwd)/libs/julian")
          mingw32-make FCFLAGS="-I$W_JUL_INC" FFLAGS="-I$W_JUL_INC"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/
          
          # 拷贝 DLL (增加了 libmetis)
          cp /mingw64/bin/libnetcdff-*.dll publish/
          cp /mingw64/bin/libnetcdf-*.dll publish/
          cp /mingw64/bin/libgfortran-*.dll publish/
          cp /mingw64/bin/libquadmath-*.dll publish/
          cp /mingw64/bin/libwinpthread-*.dll publish/
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/
          cp /mingw64/bin/msmpi.dll publish/ || echo "msmpi.dll not found"
          cp /mingw64/bin/libmetis-*.dll publish/ || echo "libmetis.dll not found"

      - name: Upload EXE Package
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM4-Windows-Binaries
          path: publish/