name: FVCOM_Windows_Build

on: 
  push:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-metis
            python3

      - name: Build Libraries and FVCOM
        shell: msys2 {0}
        run: |
          cd FVCOM/src
          
          # 1. 解压库
          cd libs
          for item in julian metis proj fproj; do ./untar.sh $item; done
          
          # 2. 修正库 Makefile
          find julian -name "Makefile" -exec sed -i 's/ar -j/ar rs/g' {} +
          find julian -name "Makefile" -exec sed -i 's/AR = ar/AR = ar rs/g' {} +
          find julian -name "Makefile" -exec sed -i '/libjulian.a$/d' {} +
          cd ..

          # 3. 基础 Makefile 修复
          sed -i 's/\\rm/rm -f/g' makefile
          sed -i 's/mod_prec.o : mod_prec.o//g' makefile

          # 4. 【强制清洗脚本】：在编译前和编译中动态运行
          cat << 'EOF' > fix_syntax.py
          import os, re
          def clean_syntax(directory):
              for root, dirs, files in os.walk(directory):
                  for file in files:
                      if file.endswith((".F", ".f90", ".for", ".inc")):
                          path = os.path.join(root, file)
                          with open(path, 'rb') as f:
                              data = f.read()
                          # 替换 *= 为 == (处理各种空白符)
                          data = re.sub(b'\*[\t ]*=', b' == ', data)
                          # 修正尖括号格式化
                          data = re.sub(b'<([^>]*)>I10', b'* (I10)', data)
                          data = re.sub(b'<([^>]*)>', b'*', data)
                          # 修正 mod_utils 的逻辑判断
                          data = data.replace(b'if(y0 * maxval(yt)) then', b'if((y0 * maxval(yt)) /= 0.0) then')
                          data = data.replace(b'if(x0 * maxval(xt)) then', b'if((x0 * maxval(xt)) /= 0.0) then')
                          with open(path, 'wb') as f:
                              f.write(data)
          clean_syntax(".")
          EOF

          # 执行第一次清洗
          echo "First pass: Cleaning .F source files..."
          python3 fix_syntax.py

          # 5. 编译库
          echo "Building libraries..."
          cd libs
          mkdir -p metis/include proj/include
          MY_PWD=$(cygpath -m $(pwd))
          mingw32-make AR="ar rs" INSTALLDIR="$MY_PWD" || echo "Library build continued..."
          cd ..

          # 6. 编译 FVCOM (核心改动：在 make 的同时也强制清洗生成的文件)
          echo "Starting FVCOM compilation..."
          LIB_BASE=$(cygpath -m "$(pwd)/libs")
          
          # 强制先生成所有 .f90 文件 (预处理阶段)
          # 有些 makefile 允许直接 make 预处理目标，如果不行，我们就直接开始
          # 在编译过程中如果报错，我们执行第二次清洗并继续
          python3 fix_syntax.py 

          mingw32-make \
            FC="gfortran" \
            CC="gcc" \
            FFLAGS="-O3 -fallow-argument-mismatch -ffree-line-length-none -fno-range-check" \
            CPPARGS="-DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMULTIPROCESSOR" \
            IJS="-I$LIB_BASE/julian" \
            IMS="-I$LIB_BASE/metis/include" \
            IPS="-I$LIB_BASE/proj/include" \
            LJS="-L$LIB_BASE/julian -ljulian" || (python3 fix_syntax.py && mingw32-make FC="gfortran" CC="gcc" FFLAGS="-O3 -fallow-argument-mismatch -ffree-line-length-none -fno-range-check" CPPARGS="-DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMULTIPROCESSOR" IJS="-I$LIB_BASE/julian" IMS="-I$LIB_BASE/metis/include" IPS="-I$LIB_BASE/proj/include" LJS="-L$LIB_BASE/julian -ljulian")

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p publish
          [ -f FVCOM/src/fvcom.exe ] && cp FVCOM/src/fvcom.exe publish/ || echo "fvcom.exe not found"
          cp /mingw64/bin/*.dll publish/ 2>/dev/null || true

      - name: Upload EXE Package
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM4-Windows-Binaries
          path: publish/