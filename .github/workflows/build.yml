name: FVCOM_Windows_Minimal_WithPetscStub

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-metis
            mingw-w64-x86_64-msmpi
            dos2unix
            perl

      - name: Build Julian
        shell: msys2 {0}
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/FVCOM/src/libs"

          if [ ! -d julian ]; then
            ./untar.sh julian || true
          fi

          if [ -d julian ]; then
            cd julian
            gcc -O3 -c *.c || true
            gfortran -O3 -c *.for || true
            ar rs libjulian.a *.o || true
            ls -la libjulian.a || true
            cd ..
          else
            echo "julian directory missing"
            exit 1
          fi

      - name: Patch Makefile (fix '\rm') and Ensure Petsc stub, then Build FVCOM
        shell: msys2 {0}
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/FVCOM/src"

          # 备份 Makefile
          cp Makefile Makefile.bak || true

          # 统一行尾（安全）
          dos2unix Makefile || true

          # 把以行首出现的 "\rm ..." 替为以 TAB 开头的 "rm -f ..."
          # 并把其余 "\rm" 替为 "rm -f"（最小安全替换）
          perl -0777 -i -pe 's/^[ \t]*\\rm[ \t]+/\trm -f /mg; s/\\rm\b/rm -f/g' Makefile

          # 确保顶部有 SHELL 和 RM 定义
          sed -i '/^SHELL[ \t]*=/d' Makefile || true
          sed -i '/^RM[ \t]*=/d' Makefile || true
          sed -i '1i RM = rm -f' Makefile
          sed -i '1i SHELL = /bin/sh' Makefile

          echo "=== Makefile head (sanity) ==="
          nl -ba Makefile | sed -n '1,80p' || true

          # —— 关键：如果源里没有 mod_petsc.F，就创建一个小的 stub（不会用到 PETSc）
          if [ ! -f mod_petsc.F ]; then
            echo "Creating stub mod_petsc.F to satisfy Makefile (no PETSc on Windows CI)"
            cat > mod_petsc.F <<'EOF'
          c --------------------------------------------------------
          c Stub module mod_petsc for Windows CI builds without PETSc
          c This provides a minimal module so Makefile rules succeed.
          c It does NOT implement PETSc functionality.
          c --------------------------------------------------------
                module mod_petsc
                implicit none
                contains
                subroutine mod_petsc_dummy()
                ! dummy stub
                return
                end subroutine mod_petsc_dummy
                end module mod_petsc
          EOF
                    fi

                    LIB_BASE=$(cygpath -m "$GITHUB_WORKSPACE/FVCOM/src/libs")
                    echo "LIB_BASE=$LIB_BASE"

                    echo "Invoke mingw32-make (RM overridden to rm -f)"
                    mingw32-make \
                      RM="rm -f" \
                      FC="gfortran" \
                      CC="gcc" \
                      FFLAGS="-O3 -cpp -fallow-argument-mismatch -ffree-line-length-none -fno-range-check" \
                      CPPFLAGS="-DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMULTIPROCESSOR" \
                      IJS="-I${LIB_BASE}/julian" \
                      IMS="-I/mingw64/include" \
                      IPS="-I/mingw64/include" \
                      LJS="-L${LIB_BASE}/julian -ljulian -L/mingw64/lib -lmetis" \
                      VERBOSE=1

      - name: Package Binary
        shell: bash
        run: |
          mkdir -p publish
          if [ -f "$GITHUB_WORKSPACE/FVCOM/src/fvcom.exe" ]; then
            cp "$GITHUB_WORKSPACE/FVCOM/src/fvcom.exe" publish/
          else
            echo "fvcom.exe not found"
          fi

          cp /mingw64/bin/libgfortran-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libquadmath-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libnetcdf-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libnetcdff-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libmetis-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/msmpi.dll publish/ 2>/dev/null || true

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM-Windows-Minimal-Fixed
          path: publish/