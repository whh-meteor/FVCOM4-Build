name: FVCOM_Windows_Clean_Final

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-metis
            dos2unix

      - name: Build FVCOM
        shell: msys2 {0}
        run: |
          set -e
          export MSYSTEM=MINGW64
          export PATH=/mingw64/bin:$PATH

          echo "Go to GitHub workspace"
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"

          echo "Current directory:"
          pwd
          ls -la

          # 如果仓库里有 FVCOM 目录
          if [ -d FVCOM/src ]; then
            cd FVCOM/src
          else
            cd src
          fi

          echo "Entered source dir:"
          pwd

          cat > make.inc <<'EOF'
          FC = gfortran
          CC = gcc

          FFLAGS = -O3 -cpp -fallow-argument-mismatch -ffree-line-length-none -fno-range-check
          CFLAGS = -O3

          DEFS = -DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMETIS_5

          INCS = -I./libs/julian -I/mingw64/include
          LIBS = -L/mingw64/lib -lmetis -lnetcdff -lnetcdf
          EOF

          dos2unix Makefile || true

          sed -i 's/-DMULTIPROCESSOR//g' Makefile
          sed -i 's/-DDATA_ASSIM//g' Makefile
          sed -i 's/-DLIMITED_NO//g' Makefile
          sed -i 's/-DSEMI_IMPLICIT//g' Makefile
          sed -i 's/-DGCN//g' Makefile
          sed -i 's/-DRIVER_FLOAT//g' Makefile
          sed -i 's/-DMPDATA//g' Makefile
          sed -i 's/-DAIR_PRESSURE//g' Makefile
          sed -i 's/-DTVD//g' Makefile

          sed -i 's/mod_petsc.F//g' Makefile
          sed -i '/mod_petsc\.o/d' Makefile

          sed -i 's/\\rm/rm -f/g' Makefile

          mingw32-make clean || true
          mingw32-make

      - name: Package
        shell: msys2 {0}
        run: |
          export MSYSTEM=MINGW64
          export PATH=/mingw64/bin:$PATH
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"

          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/ 2>/dev/null || cp src/fvcom.exe publish/ || true
          cp /mingw64/bin/libgfortran-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libquadmath-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libnetcdf-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libnetcdff-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libmetis-*.dll publish/ 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM-Windows
          path: publish/