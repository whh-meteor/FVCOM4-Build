name: FVCOM_Windows_Build

on: 
  push:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # 关键：增加了 mingw-w64-x86_64-metis
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-metis

      # 跳过手动编译 METIS，直接编译 FVCOM
      - name: Build FVCOM
        shell: msys2 {0}
        run: |
          cd FVCOM/src
          
          # 1. 修正 Makefile
          sed -i 's/\\rm/rm -f/g' makefile
          
          # 2. 【核心补丁】全系统搜索 fjulian.inc 所在的物理路径
          # 这能解决相对路径 ../libs/julian 找不到的问题
          REAL_JULIAN_DIR=$(find $(pwd)/../ -name "fjulian.inc" | xargs dirname | head -n 1)
          W_JULIAN_DIR=$(cygpath -m "$REAL_JULIAN_DIR")
          echo "Found fjulian.inc at Windows Path: $W_JULIAN_DIR"
          
          # 3. 编译
          mingw32-make clean
          # 将搜索到的绝对路径强行注入 FCFLAGS
          mingw32-make FCFLAGS="-I$W_JULIAN_DIR" FFLAGS="-I$W_JULIAN_DIR"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/
          
          # 拷贝 DLL (增加了 libmetis)
          cp /mingw64/bin/libnetcdff-*.dll publish/
          cp /mingw64/bin/libnetcdf-*.dll publish/
          cp /mingw64/bin/libgfortran-*.dll publish/
          cp /mingw64/bin/libquadmath-*.dll publish/
          cp /mingw64/bin/libwinpthread-*.dll publish/
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/
          cp /mingw64/bin/msmpi.dll publish/ || echo "msmpi.dll not found"
          cp /mingw64/bin/libmetis-*.dll publish/ || echo "libmetis.dll not found"

      - name: Upload EXE Package
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM4-Windows-Binaries
          path: publish/