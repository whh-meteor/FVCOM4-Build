name: FVCOM_Windows_Build

on:
  push:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-metis
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-proj
            python3

      # =============================
      # 1️⃣ Build Julian
      # =============================
      - name: Build Julian Library
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE/FVCOM/src/libs"

          if [ ! -d julian ]; then
            ./untar.sh julian
          fi

          cd julian
          gcc -O3 -c *.c
          gfortran -O3 -c *.for
          ar rs libjulian.a *.o
          cd ..

      # =============================
      # 2️⃣ Patch Makefile & Build FVCOM
      # =============================
      - name: Build FVCOM
        shell: msys2 {0}
        run: |
          # ---- begin paste into workflow Build FVCOM run: ----
          set -e
          cd "$GITHUB_WORKSPACE/FVCOM/src"

          echo "Working dir: $(pwd)"
          echo "Files in src:"
          ls -la | sed -n '1,200p' || true

          # 1) 规范化 line endings 并仅对 Makefile / make.inc 做文本安全处理
          find . -maxdepth 2 -type f \( -name 'Makefile' -o -name 'makefile' -o -name 'make.inc' \) -print0 \
            | xargs -0 -n1 -I{} sh -c 'echo "dos2unix {}"; dos2unix "{}" >/dev/null 2>&1 || true'

          # 2) 只替换以行首开头的反斜线 rm（例如 "\rm mod_prec.f90"）
          #    这是最安全的替换：只影响以可见缩进 + \rm 开头的命令行，不触及其它文本/注释
          find . -maxdepth 2 -type f \( -name 'Makefile' -o -name 'makefile' -o -name 'make.inc' \) -print0 \
            | xargs -0 -n1 -I{} perl -0777 -i -pe 's/^[\t ]*\\rm[ \t]+/rm -f /mg' '{}'

          # 3) 额外保护：把零散位置的 "\rm" 也换成 "rm -f"（但为避免误改，限制在这些文件里）
          find . -maxdepth 2 -type f \( -name 'Makefile' -o -name 'makefile' -o -name 'make.inc' \) -print0 \
            | xargs -0 -n1 -I{} perl -0777 -i -pe 's/\\rm\b/rm -f/g' '{}'

          # 4) 确保 Makefile 顶部有 SHELL 与 RM 定义（避免重复定义）
          if [ -f Makefile ]; then
            sed -i '/^SHELL[ 	]*=/d' Makefile || true
            sed -i '/^RM[ 	]*=/d' Makefile || true
            sed -i '1i RM = rm -f' Makefile
            sed -i '1i SHELL = /bin/sh' Makefile
          fi

          # 5) 打印 Makefile 前 80 行以便在 CI 日志里确认（非常重要）
          echo "=== Makefile head after patch ==="
          nl -ba Makefile | sed -n '1,80p' || true

          # 6) 准备 LIB_BASE，并以显式覆盖变量调用 mingw32-make（同时覆盖 RM）
          LIB_BASE=$(cygpath -m "$GITHUB_WORKSPACE/FVCOM/src/libs")
          echo "LIB_BASE=$LIB_BASE"

          # 7) 调用 make（显式把 RM 指定为 rm -f，覆盖任何残留）
          mingw32-make \
            RM="rm -f" \
            FC="gfortran" \
            CC="gcc" \
            FFLAGS="-O3 -cpp -fallow-argument-mismatch -ffree-line-length-none -fno-range-check" \
            CPPFLAGS="-DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMULTIPROCESSOR" \
            IJS="-I${LIB_BASE}/julian" \
            IMS="-I/mingw64/include" \
            IPS="-I/mingw64/include" \
            LJS="-L${LIB_BASE}/julian -ljulian -L/mingw64/lib -lmetis" \
            VERBOSE=1
          # ---- end paste ---- 

      # =============================
      # 3️⃣ Package
      # =============================
      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p publish

          if [ -f FVCOM/src/fvcom.exe ]; then
            cp FVCOM/src/fvcom.exe publish/
          else
            echo "fvcom.exe not found"
          fi

          cp /mingw64/bin/libnetcdff-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libnetcdf-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libmetis-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libgfortran-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/libquadmath-*.dll publish/ 2>/dev/null || true
          cp /mingw64/bin/msmpi.dll publish/ 2>/dev/null || true

      - name: Upload EXE Package
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM4-Windows-Binaries
          path: publish/