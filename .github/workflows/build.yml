name: FVCOM_Windows_Build

on: 
  push:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-metis

      - name: Build Libraries and FVCOM
        shell: msys2 {0}
        run: |
          cd FVCOM/src
          
          # 1. 解压所有库
          cd libs
          for item in julian metis proj fproj; do ./untar.sh $item; done
          
          # 2. 修复 Julian 库
          find julian -name "Makefile" -exec sed -i 's/ar -j/ar rs/g' {} +
          find julian -name "Makefile" -exec sed -i 's/AR = ar/AR = ar rs/g' {} +
          find julian -name "Makefile" -exec sed -i '/libjulian.a$/d' {} +
          cd ..

          # 3. 修复主 Makefile 的 Windows 兼容性
          sed -i 's/\\rm/rm -f/g' makefile
          sed -i 's/mod_prec.o : mod_prec.o//g' makefile

          # 4. 【核心修复更新】：修正 Fortran 语法
          echo "Fixing non-standard Fortran syntax in all files..."
          
          # (a) 全局替换 Intel 专有的 *= 运算符为标准 ==
          # 使用 find 确保覆盖所有模块
          find . -name "*.F" -exec sed -i 's/\*=/==/g' {} +
          
          # (b) 修正动态格式语法 <...>I10 -> *(I10)
          find . -name "*.F" -exec sed -i 's/<[^>]*>I10/*(I10)/g' {} +
          find . -name "*.F" -exec sed -i 's/<[^>]*>/*/g' {} +

          # (c) 修正 mod_utils.F 中的隐式数值逻辑判断 (Intel 扩展转标准 GNU)
          # 针对 maxval 判断进行修正
          sed -i 's/if(y0 \* maxval(yt)) then/if((y0 * maxval(yt)) \/= 0.0) then/g' mod_utils.F
          sed -i 's/if(x0 \* maxval(xt)) then/if((x0 * maxval(xt)) \/= 0.0) then/g' mod_utils.F

          # 5. 编译库
          echo "Building libraries..."
          cd libs
          mkdir -p metis/include proj/include
          MY_PWD=$(cygpath -m $(pwd))
          mingw32-make AR="ar rs" INSTALLDIR="$MY_PWD" || echo "Library build continued..."
          cd ..

          # 6. 编译 FVCOM 主程序
          echo "Starting FVCOM compilation..."
          LIB_BASE=$(cygpath -m "$(pwd)/libs")
          
          mingw32-make \
            FC="gfortran" \
            CC="gcc" \
            FFLAGS="-O3 -fallow-argument-mismatch -ffree-line-length-none -fno-range-check" \
            CPPARGS="-DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMULTIPROCESSOR" \
            IJS="-I$LIB_BASE/julian" \
            IMS="-I$LIB_BASE/metis/include" \
            IPS="-I$LIB_BASE/proj/include" \
            LJS="-L$LIB_BASE/julian -ljulian"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p publish
          if [ -f FVCOM/src/fvcom.exe ]; then
            cp FVCOM/src/fvcom.exe publish/
          fi
          
          cp /mingw64/bin/libnetcdff-*.dll publish/ || true
          cp /mingw64/bin/libnetcdf-*.dll publish/ || true
          cp /mingw64/bin/libgfortran-*.dll publish/ || true
          cp /mingw64/bin/libquadmath-*.dll publish/ || true
          cp /mingw64/bin/libwinpthread-*.dll publish/ || true
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/ || true
          cp /mingw64/bin/msmpi.dll publish/ || echo "msmpi.dll not found"
          cp /mingw64/bin/libmetis-*.dll publish/ || echo "libmetis.dll not found"

      - name: Upload EXE Package
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM4-Windows-Binaries
          path: publish/