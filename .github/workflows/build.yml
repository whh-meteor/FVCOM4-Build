name: FVCOM4.1 Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gfortran libcurl4-openssl-dev wget tar zlib1g-dev
    
    - name: Create installation directory
      run: |
        mkdir -p $HOME/opt
    
    # 安装HDF5（按照文档步骤）
    - name: Install HDF5
      run: |
        cd $HOME
        wget https://support.hdfgroup.org/ftp/HDF5/releases/hdf5-1.10/hdf5-1.10.7/src/hdf5-1.10.7.tar.gz
        tar -zxf hdf5-1.10.7.tar.gz
        cd hdf5-1.10.7
        ./configure --prefix=$HOME/opt/hdf5 --enable-fortran --enable-shared
        make -j4
        make install
    
    # 设置HDF5环境变量
    - name: Set HDF5 environment variables
      run: |
        echo "export HDF5_HOME=$HOME/opt/hdf5" >> $GITHUB_ENV
        echo "export PATH=$HOME/opt/hdf5/bin:$PATH" >> $GITHUB_ENV
        echo "export LD_LIBRARY_PATH=$HOME/opt/hdf5/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
    
    # 安装NETCDF-C（按照文档步骤）
    - name: Install NETCDF-C
      run: |
        cd $HOME
        wget https://downloads.unidata.ucar.edu/netcdf-c/4.8.1/netcdf-c-4.8.1.tar.gz
        tar -zxf netcdf-c-4.8.1.tar.gz
        cd netcdf-c-4.8.1
        export CC=gcc
        export CXX=g++
        export CPPFLAGS="-I$HOME/opt/hdf5/include"
        export LDFLAGS="-L$HOME/opt/hdf5/lib"
        ./configure --prefix=$HOME/opt/netcdf --enable-shared
        make -j4
        make install
    
    # 设置NETCDF-C环境变量
    - name: Set NETCDF-C environment variables
      run: |
        echo "export NETCDF_HOME=$HOME/opt/netcdf" >> $GITHUB_ENV
        echo "export PATH=$HOME/opt/netcdf/bin:$PATH" >> $GITHUB_ENV
        echo "export LD_LIBRARY_PATH=$HOME/opt/netcdf/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
    
    # 安装NETCDF-Fortran（按照文档步骤）
    - name: Install NETCDF-Fortran
      run: |
        cd $HOME
        wget https://downloads.unidata.ucar.edu/netcdf-fortran/4.5.3/netcdf-fortran-4.5.3.tar.gz
        tar -zxf netcdf-fortran-4.5.3.tar.gz
        cd netcdf-fortran-4.5.3
        export CC=gcc
        export FC=gfortran
        export CPPFLAGS="-I$HOME/opt/netcdf/include"
        export LDFLAGS="-L$HOME/opt/netcdf/lib"
        ./configure --prefix=$HOME/opt/netcdf --enable-shared
        make -j4
        make install
    
    # 配置FVCOM（按照文档步骤）
    - name: Configure FVCOM
      run: |
        cd FVCOM4.1
        # 复制make.inc_example文件
        cp Examples/Estuary/make.inc_example FVCOM_source/make.inc
        # 创建软链接
        ln -sf FVCOM_source/make.inc ./
        # 修改make.inc文件
        cd FVCOM_source
        # 设置TOPDIR
        sed -i 's|TOPDIR        = |TOPDIR        = $(pwd)|g' make.inc
        # 设置LIBDIR和INCDIR
        sed -i 's|LIBDIR       =  -L$(subst $(colon),$(dashL),$(LIBPATH))|LIBDIR       = -L$(INSTALLDIR)/lib -L../METIS_source/metis -L./libs/julian|g' make.inc
        sed -i 's|INCDIR       =  -I$(subst $(colon),$(dashI),$(INCLUDEPATH))|INCDIR       = -I$(INSTALLDIR)/include -I../METIS_source/metis -I./libs/julian|g' make.inc
        # 设置NETCDF和HDF5路径
        sed -i 's|IOLIBS       =  -lnetcdf|IOLIBS       = -L'"$HOME/opt/netcdf"'/lib -L'"$HOME/opt/hdf5"'/lib -lnetcdff -lnetcdf -lhdf5_hl -lhdf5 -lz -lcurl -lm|g' make.inc
        sed -i 's|IOINCS       =  #|IOINCS       = -I'"$HOME/opt/netcdf"'/include -I'"$HOME/opt/hdf5"'/include|g' make.inc
        # 设置gfortran编译选项
        sed -i '/#  Intel\/MPI Compiler Definitions (SMAST)/,/#  gfortran defs/ s/^/#/' make.inc
        sed -i '/#  gfortran defs/,/#--------------------------------------------------------------------------/ s/^#//' make.inc
        sed -i 's|FC       = gfortran  -O3|FC       = mpif90|g' make.inc
        sed -i 's|OPT      =|OPT      = -O3 -ffixed-line-length-none -ffree-form -ffree-line-length-none|g' make.inc
        sed -i '/FC       = mpif90/a           CC       = mpicc
           CXX      = mpicxx' make.inc
        # 检查修改后的make.inc文件
        cat make.inc | grep -E "TOPDIR|LIBDIR|INCDIR|IOLIBS|IOINCS|COMPILER|FC|OPT"
    
    # 安装OpenMPI
    - name: Install OpenMPI
      run: |
        sudo apt-get install -y openmpi-bin openmpi-common libopenmpi-dev
    
    # 编译METIS库（按照文档步骤）
    - name: Build METIS library
      run: |
        cd FVCOM4.1
        # 创建METIS_source目录
        mkdir -p METIS_source
        cd METIS_source
        # 复制metis.tgz文件
        cp ../FVCOM_source/libs/metis.tgz ./
        # 解压
        tar -zxf metis.tgz
        # 进入metis目录
        cd metis
        # 创建安装目录
        mkdir -p ../../FVCOM_source/libs/install/lib
        mkdir -p ../../FVCOM_source/libs/install/include
        mkdir -p ../../FVCOM_source/libs/install/bin
        # 编译安装
        make -j
        make install
    
    # 编译julian库（按照文档步骤）
    - name: Build julian library
      run: |
        cd FVCOM4.1/FVCOM_source/libs
        # 解压julian.tgz
        tar -zxf julian.tgz
        # 进入julian目录
        cd julian
        # 编译安装
        make -j
        make install
    
    # 修改mod_newinp.F文件（按照文档步骤）
    - name: Modify mod_newinp.F
      run: |
        cd FVCOM4.1/FVCOM_source
        # 备份原始文件
        cp mod_newinp.F mod_newinp.F.bak
        # 添加N_Fmt函数
        sed -i '/contains/i !----------------------------------------
      ! functions
      !----------------------------------------
      ' mod_newinp.F
              sed -i '/contains/a   Character( Len = 256 ) Function N_Fmt( c , n )
          Character( Len = * ) , Intent( IN ) :: c
          Integer , Intent( IN ) :: n
          integer :: i , j
          character( len = 16 ) :: cn
          i = index( c , '<' )
          j = index( c , '>' )
          write( cn , '(g0)' ) n
          N_Fmt = c(:i-1) // Trim(adjustL(cn)) // c(j+1:)
        End Function N_Fmt
      ' mod_newinp.F
              # 修改第352行附近的write语句
              sed -i 's/write(\*,\'(A20,<size>F10.4)\')trim(argname)//\': \',fval(1:SIZE)/write(\*,N_Fmt(\'(A20,<size>F10.4)\',SIZE))trim(argname)//\': \',fval(1:SIZE)/g' mod_newinp.F
              # 修改第421行附近的write语句
              sed -i 's/write(\*,\'(A20,<size>I10)\')trim(argname)//\': \',ival(1:SIZE)/write(\*,N_Fmt(\'(A20,<size>I10)\',SIZE))trim(argname)//\': \',ival(1:SIZE)/g' mod_newinp.F
              # 修改第494行附近的write语句
              sed -i 's/write(\*,\'(A20,<size>L10)\')trim(argname)//\': \',cval(1:SIZE)/write(\*,N_Fmt(\'(A20,<size>L10)\',SIZE))trim(argname)//\': \',cval(1:SIZE)/g' mod_newinp.F
              # 修改第567行附近的write语句
              sed -i 's/write(\*,\'(A20,<size>A10)\')trim(argname)//\': \',sval(1:SIZE)/write(\*,N_Fmt(\'(A20,<size>A10)\',SIZE))trim(argname)//\': \',sval(1:SIZE)/g' mod_newinp.F
          
        # 修改其他文件（按照文档步骤）
        - name: Modify other files
          run: |
            cd FVCOM4.1/FVCOM_source
            # 修改mod_scal.F
            sed -i 's/\/=\.TRUE\./\.neqv\.\.TRUE\./g' mod_scal.F
            # 修改internal_step.F
            sed -i 's/==\.TRUE/\.eqv\.\.TRUE/g' internal_step.F
            # 修改adv_t.F
            sed -i 's/==\.FALSE\./\.eqv\.\.FALSE\./g' adv_t.F
            # 修改adv_s.F
            sed -i 's/==\.FALSE\./\.eqv\.\.FALSE\./g' adv_s.F
        
    # 编译FVCOM（按照文档步骤）
    - name: Build FVCOM
      run: |
        cd FVCOM4.1/FVCOM_source
        make clean
        make -j4
    
    # 测试Estuary算例（按照文档步骤）
    - name: Test Estuary example
      run: |
        cd FVCOM4.1/Examples/Estuary
        cp make.inc_example make.inc
        cd run
        ln -sf ../../FVCOM_source/fvcom .
        ./fvcom
    
    # 测试Inlet算例（按照文档步骤）
    - name: Test Inlet example
      run: |
        cd FVCOM4.1/Examples/Inlets
        cp make.inc_example make.inc
        cd run
        ln -sf ../../FVCOM_source/fvcom .
        ./fvcom
    
    # 上传编译后的文件作为构件
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fvcom-build
        path: |
          FVCOM4.1/FVCOM_source/fvcom
          FVCOM4.1/Examples/Estuary/run/
          FVCOM4.1/Examples/Inlets/run/
