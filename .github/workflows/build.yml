name: FVCOM_Windows_Final_Stable

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: minimal
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-metis
            mingw-w64-x86_64-pkgconf

      - name: Build FVCOM
        shell: msys2 {0}
        run: |
          set -e

          echo "===== ENV CHECK ====="
          echo "MSYSTEM=$MSYSTEM"
          which gfortran
          which pkg-config

          cd "$GITHUB_WORKSPACE/FVCOM/src"

          echo "===== GET NETCDF FLAGS ====="
          NETCDF_CFLAGS=$(pkg-config --cflags netcdf-fortran)
          NETCDF_LIBS=$(pkg-config --libs netcdf-fortran)

          echo "NETCDF_CFLAGS=$NETCDF_CFLAGS"
          echo "NETCDF_LIBS=$NETCDF_LIBS"

          echo "===== WRITE CLEAN make.inc ====="

          cat > make.inc <<EOF
          FC = gfortran
          CC = gcc

          FFLAGS = -O3 -cpp -fallow-argument-mismatch -ffree-line-length-none -fno-range-check
          CFLAGS = -O3

          DEFS = -DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMETIS_5

          INCS = -I./libs/julian $NETCDF_CFLAGS
          LIBS = -L./libs/julian -ljulian -lmetis $NETCDF_LIBS
          EOF

          mingw32-make clean || true
          mingw32-make

          ls -lh fvcom.exe

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/

          cp /mingw64/bin/libgfortran-*.dll publish/ || true
          cp /mingw64/bin/libquadmath-*.dll publish/ || true
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/ || true
          cp /mingw64/bin/libwinpthread-*.dll publish/ || true
          cp /mingw64/bin/libnetcdf-*.dll publish/ || true
          cp /mingw64/bin/libnetcdff-*.dll publish/ || true
          cp /mingw64/bin/libmetis-*.dll publish/ || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM-Windows
          path: publish/