name: FVCOM_Windows_Final_Stable

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: minimal
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-metis
            mingw-w64-x86_64-pkgconf
            make

      - name: Build FVCOM
        shell: msys2 {0}
        run: |
          set -e

          echo "===== ENV CHECK ====="
          echo "MSYSTEM=$MSYSTEM"
          which gfortran

          cd "$GITHUB_WORKSPACE/FVCOM/src"

          echo "===== CREATE FAKE MPI MODULE ====="
          cat > mpi.f90 <<'EOF'
          module mpi
            implicit none
            integer, parameter :: MPI_SUCCESS = 0
            integer, parameter :: MPI_COMM_WORLD = 0
            integer, parameter :: MPI_LOGICAL = 0
            integer, parameter :: MPI_INTEGER = 0
            integer, parameter :: MPI_DOUBLE_PRECISION = 0
            integer, parameter :: MPI_SUM = 0
            integer, parameter :: MPI_MAX = 0
            integer, parameter :: MPI_MIN = 0
            integer, parameter :: MPI_LOR = 0
            integer, parameter :: MPI_LAND = 0
            integer, parameter :: MPI_BOR = 0
            integer, parameter :: MPI_BAND = 0
            integer, parameter :: MPI_LXOR = 0
            integer, parameter :: MPI_BXOR = 0
            integer, parameter :: MPI_MAXLOC = 0
            integer, parameter :: MPI_MINLOC = 0
            integer, parameter :: MPI_CHARACTER = 0
            integer, parameter :: MPI_BYTE = 0
            integer, parameter :: MPI_PACKED = 0
            integer, parameter :: MPI_REAL4 = 0
            integer, parameter :: MPI_REAL8 = 0
            integer, parameter :: MPI_REAL = 0
            integer, parameter :: MPI_2DOUBLE_PRECISION = 0
            integer, parameter :: MPI_2REAL = 0
            integer, parameter :: MPI_LONG_DOUBLE = 0
            integer, parameter :: MPI_UNSIGNED_CHAR = 0
            integer, parameter :: MPI_WCHAR = 0
            integer, parameter :: MPI_SHORT = 0
            integer, parameter :: MPI_UNSIGNED_SHORT = 0
            integer, parameter :: MPI_UNSIGNED = 0
            integer, parameter :: MPI_LONG = 0
            integer, parameter :: MPI_UNSIGNED_LONG = 0
            integer, parameter :: MPI_LONG_LONG_INT = 0
            integer, parameter :: MPI_UNSIGNED_LONG_LONG = 0
            integer, parameter :: MPI_FLOAT_INT = 0
            integer, parameter :: MPI_DOUBLE_INT = 0
            integer, parameter :: MPI_LONG_INT = 0
            integer, parameter :: MPI_SHORT_INT = 0
            integer, parameter :: MPI_2INT = 0
            integer, parameter :: MPI_LONG_DOUBLE_INT = 0
            integer, parameter :: MPI_STATUS_SIZE = 0
            integer, parameter :: MPI_ANY_SOURCE = 0
            integer, parameter :: MPI_ANY_TAG = 0
            integer, parameter :: MPI_PROC_NULL = 0
            integer, parameter :: MPI_ROOT = 0
            integer, parameter :: MPI_UNDEFINED = 0
            integer, parameter :: MPI_COMM_NULL = 0
            integer, parameter :: MPI_COMM_SELF = 0
            integer, parameter :: MPI_COMM_TYPE_SHARED = 0
            integer, parameter :: MPI_IDENT = 0
            integer, parameter :: MPI_CONGRUENT = 0
