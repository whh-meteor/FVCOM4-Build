          EOF

          gfortran -c mpi.f90

          echo "===== WRITE make.inc ====="

          cat > make.inc <<'EOF'
          FC = gfortran
          CC = gcc
          RM = rm -f

          FFLAGS = -O3 -cpp -fallow-argument-mismatch -ffree-line-length-none -fno-range-check
          CFLAGS = -O3

          CPPARGS = -DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMETIS_5

          INCS = -I./libs/julian -I/mingw64/include -I.
          LIBS = -L./libs/julian -ljulian -L/mingw64/lib -lmetis -lnetcdff -lnetcdf
          EOF

          cat make.inc

          make clean || true
          make

          ls -lh fvcom.exe

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/

          cp /mingw64/bin/libgfortran-*.dll publish/ || true
          cp /mingw64/bin/libquadmath-*.dll publish/ || true
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/ || true
          cp /mingw64/bin/libwinpthread-*.dll publish/ || true
          cp /mingw64/bin/libnetcdf-*.dll publish/ || true
          cp /mingw64/bin/libnetcdff-*.dll publish/ || true
          cp /mingw64/bin/libmetis-*.dll publish/ || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM-Windows
          path: publish/
