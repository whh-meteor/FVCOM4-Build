name: FVCOM_Windows_Build

on: 
  push:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # 关键：增加了 mingw-w64-x86_64-metis
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-metis

      # 跳过手动编译 METIS，直接编译 FVCOM
      - name: Build Libraries and FVCOM
        shell: msys2 {0}
        run: |
          cd FVCOM/src
          
          # 1. 解压所有库 (确保路径存在)
          cd libs
          for item in julian metis proj fproj; do ./untar.sh $item; done
          
          # 2. 修复 Julian 库的 Makefile 逻辑错误 (Error 193 & ar)
          find julian -name "Makefile" -exec sed -i 's/ar -j/ar rs/g' {} +
          find julian -name "Makefile" -exec sed -i 's/AR = ar/AR = ar rs/g' {} +
          # 删掉那个导致 Error 193 的空行或执行行
          find julian -name "Makefile" -exec sed -i '/libjulian.a$/d' {} +
          cd ..

          # 3. 彻底修复主 Makefile 的 Windows 兼容性
          # 将 \rm 替换为 rm -f
          sed -i 's/\\rm/rm -f/g' makefile
          # 修复循环依赖警告 (某些 makefile 定义了 mod_prec.o: mod_prec.o)
          sed -i 's/mod_prec.o : mod_prec.o//g' makefile

          # 4. 编译库
          echo "Building libraries..."
          cd libs
          # 强制指定安装路径，防止 include 文件夹找不到
          MY_PWD=$(cygpath -m $(pwd))
          mingw32-make AR="ar rs" INSTALLDIR="$MY_PWD" || echo "Library build continued..."
          cd ..

          # 5. 编译 FVCOM 主程序
          echo "Starting FVCOM compilation..."
          # 获取绝对路径（Windows 格式）
          LIB_BASE=$(cygpath -m "$(pwd)/libs")
          
          # 动态修正主 Makefile 里的路径变量 (如果它们写死了)
          # 或者在命令行直接传入
          mingw32-make \
            FC="gfortran" \
            CC="gcc" \
            CPPARGS="-DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMULTIPROCESSOR" \
            IJS="-I$LIB_BASE/julian" \
            IMS="-I$LIB_BASE/metis/include" \
            IPS="-I$LIB_BASE/proj/include" \
            LJS="-L$LIB_BASE/julian -ljulian"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/
          
          # 拷贝 DLL (增加了 libmetis)
          cp /mingw64/bin/libnetcdff-*.dll publish/
          cp /mingw64/bin/libnetcdf-*.dll publish/
          cp /mingw64/bin/libgfortran-*.dll publish/
          cp /mingw64/bin/libquadmath-*.dll publish/
          cp /mingw64/bin/libwinpthread-*.dll publish/
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/
          cp /mingw64/bin/msmpi.dll publish/ || echo "msmpi.dll not found"
          cp /mingw64/bin/libmetis-*.dll publish/ || echo "libmetis.dll not found"

      - name: Upload EXE Package
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM4-Windows-Binaries
          path: publish/