name: FVCOM_Windows_Build

on: 
  push:
  workflow_dispatch:

jobs:
  build_job:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # 关键：增加了 mingw-w64-x86_64-metis
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-metis

      # 跳过手动编译 METIS，直接编译 FVCOM
      - name: Build Libraries and FVCOM
        shell: msys2 {0}
        run: |
          cd FVCOM/src
          
          # 1. 解压并修复 Julian 库
          cd libs
          ./untar.sh julian
          # 修复 ar 参数
          find julian -name "Makefile" -exec sed -i 's/ar -j/ar rs/g' {} +
          # 【新增修复】：删掉 Makefile 中试图执行 .a 文件的错误行
          find julian -name "Makefile" -exec sed -i '/libjulian.a$/d' {} +
          cd ..

          # 2. 修改 libs/Makefile 确保包含 julian
          sed -i 's/PACKAGES =.*/PACKAGES = julian metis proj fproj/g' libs/makefile || true

          # 3. 编译库（忽略执行错误，因为库已经生成了）
          echo "Building libraries..."
          cd libs
          # 使用 -k (keep going) 即使子目录报错也继续，或者直接执行编译
          mingw32-make AR="ar rs" || echo "Library make finished with minor errors, checking results..."
          
          # 检查关键库是否存在
          if [ -f julian/libjulian.a ]; then
            echo "SUCCESS: libjulian.a is ready."
          else
            echo "ERROR: libjulian.a failed to build."
            exit 1
          fi
          cd ..

          # 4. 编译 FVCOM 主程序
          echo "Starting FVCOM compilation..."
          # 确保编译器能找到刚刚生成的静态库和头文件
          W_JUL_PATH=$(cygpath -m "$(pwd)/libs/julian")
          mingw32-make FCFLAGS="-I$W_JUL_PATH" FFLAGS="-I$W_JUL_PATH" LDFLAGS="-L$W_JUL_PATH -ljulian"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/
          
          # 拷贝 DLL (增加了 libmetis)
          cp /mingw64/bin/libnetcdff-*.dll publish/
          cp /mingw64/bin/libnetcdf-*.dll publish/
          cp /mingw64/bin/libgfortran-*.dll publish/
          cp /mingw64/bin/libquadmath-*.dll publish/
          cp /mingw64/bin/libwinpthread-*.dll publish/
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/
          cp /mingw64/bin/msmpi.dll publish/ || echo "msmpi.dll not found"
          cp /mingw64/bin/libmetis-*.dll publish/ || echo "libmetis.dll not found"

      - name: Upload EXE Package
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM4-Windows-Binaries
          path: publish/