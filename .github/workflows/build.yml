name: FVCOM_Windows_Final_Stable

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: minimal
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-make
            mingw-w64-x86_64-netcdf
            mingw-w64-x86_64-netcdf-fortran
            mingw-w64-x86_64-metis
            mingw-w64-x86_64-pkgconf
            make

      - name: Build FVCOM
        shell: msys2 {0}
        run: |
          set -e

          echo "===== ENV CHECK ====="
          echo "MSYSTEM=$MSYSTEM"
          which gfortran

          cd "$GITHUB_WORKSPACE/FVCOM/src"

          echo "===== WRITE make.inc ====="

          cat > make.inc <<'EOF'
          FC = gfortran
          CC = gcc
          RM = rm -f

          FFLAGS = -O3 -cpp -fallow-argument-mismatch -ffree-line-length-none -fno-range-check
          CFLAGS = -O3

          CPPARGS = -DGFORTRAN -DDOUBLE_PRECISION -DWET_DRY -DMETIS_5

          INCS = -I./libs/julian -I/mingw64/include
          LIBS = -L./libs/julian -ljulian -L/mingw64/lib -lmetis -lnetcdff -lnetcdf
          EOF

          cat make.inc

          make clean || true

          echo "===== RECREATE mpi_constants.f90 (deleted by make clean) ====="
          cat > mpi_constants.f90 <<'EOF'
module mpi_constants
  implicit none
  
  integer, parameter :: MPI_SUCCESS = 0
  integer, parameter :: MPI_COMM_WORLD = 0
  integer, parameter :: MPI_LOGICAL = 0
  integer, parameter :: MPI_INTEGER = 0
  integer, parameter :: MPI_DOUBLE_PRECISION = 0
  integer, parameter :: MPI_SUM = 0
  integer, parameter :: MPI_MAX = 0
  integer, parameter :: MPI_MIN = 0
  integer, parameter :: MPI_BCAST = 0
  integer, parameter :: MPI_COMM_RANK = 0
  integer, parameter :: MPI_COMM_SIZE = 0
  integer, parameter :: MPI_ABORT = 0
  integer, parameter :: MPI_FINALIZE = 0
  integer, parameter :: MPI_INIT = 0
  integer, parameter :: MPI_STATUS_IGNORE = 0
  integer, parameter :: MPI_STATUSES_IGNORE = 0
  integer, parameter :: MPI_ANY_SOURCE = 0
  integer, parameter :: MPI_ANY_TAG = 0
  integer, parameter :: MPI_UNDEFINED = 0
  integer, parameter :: MPI_ROOT = 0
  
end module mpi_constants
EOF

          make

          ls -lh fvcom.exe

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p publish
          cp FVCOM/src/fvcom.exe publish/

          cp /mingw64/bin/libgfortran-*.dll publish/ || true
          cp /mingw64/bin/libquadmath-*.dll publish/ || true
          cp /mingw64/bin/libgcc_s_seh-*.dll publish/ || true
          cp /mingw64/bin/libwinpthread-*.dll publish/ || true
          cp /mingw64/bin/libnetcdf-*.dll publish/ || true
          cp /mingw64/bin/libnetcdff-*.dll publish/ || true
          cp /mingw64/bin/libmetis-*.dll publish/ || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FVCOM-Windows
          path: publish/
